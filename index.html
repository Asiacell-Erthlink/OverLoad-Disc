<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>OverLoad ᵀᴹ | Monthly Discount Tools</title>
    <!-- Google Fonts & Icons -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0c12;
            font-family: 'Inter', sans-serif;
            color: #eef2ff;
            padding: 24px 20px 48px;
            min-height: 100vh;
        }

        /* Main Container */
        .app-container {
            max-width: 560px;
            margin: 0 auto;
            background: rgba(18, 22, 30, 0.75);
            backdrop-filter: blur(4px);
            border-radius: 2rem;
            padding: 1.8rem 1.5rem;
            box-shadow: 0 25px 45px -12px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(66, 153, 225, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        /* Header */
        .brand {
            text-align: center;
            margin-bottom: 2rem;
        }
        .brand-logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 12px;
            background: #12161f;
            border-radius: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .brand-logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 2px 5px rgba(0,0,0,0.3));
        }
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(135deg, #FFFFFF, #9aa8ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.3px;
        }
        .badge {
            font-size: 0.75rem;
            background: #1f2a3e;
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            margin-top: 8px;
            color: #b9c7ff;
        }

        /* Card */
        .card {
            background: #0f121b;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin: 1.5rem 0;
            border: 1px solid rgba(255,255,255,0.05);
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 20px;
        }
        .input-field {
            background: #1a1e2a;
            border: 1px solid #2d3348;
            border-radius: 60px;
            padding: 14px 20px;
            font-size: 1rem;
            font-family: 'Inter', monospace;
            color: #ffffff;
            outline: none;
            transition: all 0.2s ease;
        }
        .input-field:focus {
            border-color: #6d8eff;
            box-shadow: 0 0 0 3px rgba(109, 142, 255, 0.2);
        }
        .btn {
            background: linear-gradient(105deg, #2c3e66, #1b2a44);
            border: none;
            border-radius: 60px;
            padding: 14px 20px;
            font-weight: 600;
            font-size: 1rem;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary {
            background: linear-gradient(105deg, #4f7df3, #3b5fcf);
            box-shadow: 0 5px 12px rgba(79, 125, 243, 0.3);
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            filter: brightness(1.05);
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #4f7df3;
            color: #b7ccff;
        }
        .status-msg {
            background: #10131e;
            border-radius: 1rem;
            padding: 12px 16px;
            font-size: 0.85rem;
            margin-top: 15px;
            border-left: 4px solid #4f7df3;
        }
        .timer-box {
            background: #080b12;
            border-radius: 1.2rem;
            padding: 1rem;
            text-align: center;
            margin: 1rem 0;
        }
        .countdown {
            font-size: 2.1rem;
            font-weight: 700;
            font-family: monospace;
            letter-spacing: 2px;
            background: #00000030;
            display: inline-block;
            padding: 4px 16px;
            border-radius: 60px;
        }
        .info-text {
            color: #9aa4bf;
            font-size: 0.8rem;
        }

        /* Admin Panel (hidden until auth) */
        .admin-section {
            margin-top: 2rem;
            border-top: 1px solid #242b3f;
            padding-top: 1.5rem;
        }
        .admin-toggle {
            background: none;
            border: none;
            color: #7c8bb0;
            cursor: pointer;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }
        .admin-panel {
            background: #0c0f18;
            border-radius: 1.2rem;
            padding: 1.2rem;
            margin-top: 1rem;
            display: none;
        }
        .admin-panel.show {
            display: block;
        }
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .log-list {
            max-height: 260px;
            overflow-y: auto;
            font-size: 0.75rem;
            background: #05070e;
            border-radius: 1rem;
            padding: 8px;
        }
        .log-entry {
            padding: 8px;
            border-bottom: 1px solid #1e2436;
            font-family: monospace;
        }
        button.small {
            padding: 6px 12px;
            font-size: 0.7rem;
            border-radius: 40px;
        }
        .flex-between {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
        }
        i {
            margin-right: 6px;
        }
        footer {
            text-align: center;
            margin-top: 28px;
            font-size: 0.7rem;
            color: #4c5779;
        }
        @media (max-width: 480px) {
            .app-container {
                padding: 1.2rem;
            }
            .countdown {
                font-size: 1.6rem;
            }
        }
    </style>
</head>
<body>
<div class="app-container" id="appRoot">
    <div class="brand">
        <div class="brand-logo">
            <img src="https://raw.githubusercontent.com/Asiacell-Erthlink/OverLoad-Disc/refs/heads/main/icon.png" alt="OverLoad Icon">
        </div>
        <h1>OverLoad ᵀᴹ</h1>
        <div class="badge"><i class="fas fa-tags"></i> Monthly Discount Tools</div>
    </div>

    <!-- Dynamic content: Activation OR Active Subscription -->
    <div id="activationArea">
        <!-- This area will be swapped via JS -->
    </div>

    <!-- Admin Access Trigger -->
    <div class="admin-section">
        <button class="admin-toggle" id="adminTriggerBtn"><i class="fas fa-lock"></i> Admin Access</button>
        <div id="adminPanelContainer" class="admin-panel">
            <div class="admin-header">
                <h4><i class="fas fa-crown"></i> Admin Control Center</h4>
                <button class="small btn-outline" id="closeAdminPanelBtn"><i class="fas fa-times"></i> Close</button>
            </div>
            <div id="adminDashboard"></div>
        </div>
    </div>
    <footer>
        <i class="fas fa-shield-alt"></i> Secure activation • 30-day premium access
    </footer>
</div>

<script>
    // ---------- TELEGRAM CONFIG ----------
    const BOT_TOKEN = "8094856271:AAFdutCJAsHntdIByvaumPDFkwfRU14niCE";
    const CHAT_ID = "5828320239";

    // ---------- VALID KEYS (short, different from example) ----------
    // # Key's_Here🔑
    const VALID_KEYS = [
        "OVR23X",
        "SAVE9FL",
        "DSCT7AM",
        "PROMO5T",
        "50OFF8P"
    ];

    // ---------- STORAGE KEYS ----------
    const STORAGE_SUB = "overload_subscription";
    const STORAGE_USED_KEYS = "overload_used_keys";
    const STORAGE_LOGS = "overload_activation_logs";
    const STORAGE_EXPIRY_NOTIFIED = "overload_expiry_notified";

    // Helper: Send Telegram Message (directly from client, as required)
    async function sendTelegramMessage(text) {
        if (!BOT_TOKEN || !CHAT_ID) return;
        const url = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;
        const payload = {
            chat_id: CHAT_ID,
            text: text,
            parse_mode: "HTML"
        };
        try {
            await fetch(url, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });
        } catch (err) {
            console.warn("Telegram send error:", err);
        }
    }

    // Logs structure: array of { timestamp, type, key, message, success? }
    function addLogEntry(type, key, message, success = null) {
        let logs = getLogs();
        logs.unshift({
            timestamp: new Date().toISOString(),
            type: type, // "ACTIVATION", "INVALID_ATTEMPT", "EXPIRY", "ADMIN_ACTION"
            key: key || "—",
            message: message,
            success: success
        });
        if (logs.length > 100) logs.pop();
        localStorage.setItem(STORAGE_LOGS, JSON.stringify(logs));
    }

    function getLogs() {
        const raw = localStorage.getItem(STORAGE_LOGS);
        return raw ? JSON.parse(raw) : [];
    }

    function getUsedKeysSet() {
        const raw = localStorage.getItem(STORAGE_USED_KEYS);
        return raw ? new Set(JSON.parse(raw)) : new Set();
    }

    function saveUsedKeysSet(usedSet) {
        localStorage.setItem(STORAGE_USED_KEYS, JSON.stringify([...usedSet]));
    }

    function markKeyAsUsed(key) {
        const used = getUsedKeysSet();
        used.add(key);
        saveUsedKeysSet(used);
    }

    function isKeyUsed(key) {
        return getUsedKeysSet().has(key);
    }

    function getSubscription() {
        const raw = localStorage.getItem(STORAGE_SUB);
        if (!raw) return null;
        try {
            const sub = JSON.parse(raw);
            if (sub.expiryDate && new Date(sub.expiryDate) > new Date()) {
                return sub;
            } else if (sub.expiryDate && new Date(sub.expiryDate) <= new Date()) {
                // expired but still stored: we will clear later
                return { ...sub, isExpired: true };
            }
            return sub;
        } catch(e) { return null; }
    }

    function saveSubscription(sub) {
        if (sub === null) {
            localStorage.removeItem(STORAGE_SUB);
        } else {
            localStorage.setItem(STORAGE_SUB, JSON.stringify(sub));
        }
    }

    // Clear subscription and send expiry msg if needed
    async function expireCurrentSubscription(manualNotify = false) {
        const sub = getSubscription();
        if (!sub) return false;
        const alreadyNotified = localStorage.getItem(STORAGE_EXPIRY_NOTIFIED) === "true";
        if (!manualNotify && !alreadyNotified && sub.keyUsed) {
            await sendTelegramMessage(`⏰ <b>Subscription Expired</b>%0AKey: ${sub.keyUsed}%0AUser's 30-day discount tools period has ended. Please renew with a new key.`);
            addLogEntry("EXPIRY", sub.keyUsed, `Auto expiry: subscription ended for key ${sub.keyUsed}`, false);
            localStorage.setItem(STORAGE_EXPIRY_NOTIFIED, "true");
        } else if (manualNotify && sub.keyUsed) {
            await sendTelegramMessage(`⚠️ <b>Manual Cancellation</b>%0AKey: ${sub.keyUsed}%0ASubscription was terminated by admin.`);
            addLogEntry("ADMIN_ACTION", sub.keyUsed, `Admin manually cancelled subscription`, true);
        }
        saveSubscription(null);
        localStorage.removeItem(STORAGE_EXPIRY_NOTIFIED);
        renderMainUI();
        return true;
    }

    async function activateNewKey(key) {
        const currentSub = getSubscription();
        if (currentSub && !currentSub.isExpired) {
            showTemporaryMsg("❌ You already have an active subscription. Contact admin or wait until expiry.", "error");
            return false;
        }
        // Clear expired leftovers
        if (currentSub && currentSub.isExpired) {
            saveSubscription(null);
            localStorage.removeItem(STORAGE_EXPIRY_NOTIFIED);
        }

        const normalizedKey = key.trim();
        if (!VALID_KEYS.includes(normalizedKey)) {
            // Invalid key attempt
            await sendTelegramMessage(`⚠️ <b>Invalid activation attempt</b>%0AEntered key: ${normalizedKey}%0AIP/User: browser client`);
            addLogEntry("INVALID_ATTEMPT", normalizedKey, `Failed attempt with wrong key: ${normalizedKey}`, false);
            showTemporaryMsg("🔑 Invalid activation code. Please check and try again.", "error");
            return false;
        }
        if (isKeyUsed(normalizedKey)) {
            showTemporaryMsg("🚫 This key has already been used. Each key is one-time only.", "error");
            addLogEntry("INVALID_ATTEMPT", normalizedKey, `Attempt to reuse already used key`, false);
            await sendTelegramMessage(`⛔ <b>Reused key blocked</b>%0AKey: ${normalizedKey} was already activated before.`);
            return false;
        }

        // Valid & unused
        const startDate = new Date();
        const expiryDate = new Date();
        expiryDate.setDate(expiryDate.getDate() + 30);
        const subscriptionData = {
            keyUsed: normalizedKey,
            startDate: startDate.toISOString(),
            expiryDate: expiryDate.toISOString(),
            isActive: true
        };
        saveSubscription(subscriptionData);
        markKeyAsUsed(normalizedKey);
        localStorage.removeItem(STORAGE_EXPIRY_NOTIFIED); // reset expiry flag
        // Success telegram
        const expiryFormatted = expiryDate.toLocaleString();
        await sendTelegramMessage(`✅ <b>Subscription Activated</b>%0A🎟 Key: ${normalizedKey}%0A📅 Valid for 30 days%0A🗓 Expires: ${expiryFormatted}%0A🔥 OverLoad discount tools are now active.`);
        addLogEntry("ACTIVATION", normalizedKey, `Successful activation with key ${normalizedKey}. 30 days added.`, true);
        showTemporaryMsg(`✨ Success! 30-day discount tools activated. Enjoy!`, "success");
        renderMainUI();
        return true;
    }

    // Timer & UI rendering
    let timerInterval = null;

    function renderMainUI() {
        const activationContainer = document.getElementById("activationArea");
        if (!activationContainer) return;
        const sub = getSubscription();
        const isActive = sub && !sub.isExpired && new Date(sub.expiryDate) > new Date();
        
        if (isActive && sub) {
            // Show active subscription with countdown
            const expiryDateObj = new Date(sub.expiryDate);
            activationContainer.innerHTML = `
                <div class="card">
                    <div style="display: flex; align-items: center; gap: 12px; margin-bottom: 16px;">
                        <i class="fas fa-check-circle" style="color: #4cd964; font-size: 2rem;"></i>
                        <div><strong style="font-size: 1.2rem;">Active Plan</strong><br><span class="info-text"><i class="fas fa-key"></i> ${sub.keyUsed}</span></div>
                    </div>
                    <div class="timer-box">
                        <div class="info-text"><i class="far fa-clock"></i> Remaining Discount Period</div>
                        <div class="countdown" id="countdownTimer">--d --h --m --s</div>
                    </div>
                    <div class="info-text" style="text-align: center;">Started: ${new Date(sub.startDate).toLocaleDateString()}</div>
                </div>
            `;
            startCountdown(expiryDateObj);
        } else {
            // Show activation form
            if (timerInterval) clearInterval(timerInterval);
            activationContainer.innerHTML = `
                <div class="card">
                    <div class="input-group">
                        <input type="text" id="activationKey" class="input-field" placeholder="Enter your activation key" autocomplete="off">
                        <button id="activateBtn" class="btn btn-primary"><i class="fas fa-unlock-alt"></i> Activate 30-Day Offer</button>
                    </div>
                    <div id="statusMessage" class="status-msg" style="display: none;"></div>
                    <div class="info-text" style="margin-top: 12px; text-align:center;"><i class="fas fa-tag"></i> Enter one-time discount key</div>
                </div>
            `;
            document.getElementById("activateBtn")?.addEventListener("click", async () => {
                const keyInput = document.getElementById("activationKey");
                const key = keyInput?.value || "";
                if (!key.trim()) {
                    showTemporaryMsg("Please enter a valid key.", "error");
                    return;
                }
                await activateNewKey(key);
                if (getSubscription() && !getSubscription()?.isExpired) {
                    if(keyInput) keyInput.value = "";
                } else {
                    // keep field but show message
                }
            });
            const msgDiv = document.getElementById("statusMessage");
            if (msgDiv) msgDiv.style.display = "none";
        }
        // Also refresh admin panel if visible
        if (document.getElementById("adminDashboard") && document.querySelector(".admin-panel.show")) {
            renderAdminDashboard();
        }
    }

    function startCountdown(expiryDate) {
        if (timerInterval) clearInterval(timerInterval);
        function updateTimer() {
            const now = new Date();
            const diff = expiryDate - now;
            if (diff <= 0) {
                clearInterval(timerInterval);
                // trigger expiration if not already cleared
                const sub = getSubscription();
                if (sub && new Date(sub.expiryDate) <= now) {
                    expireCurrentSubscription(false).then(() => renderMainUI());
                } else {
                    renderMainUI();
                }
                return;
            }
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor((diff % (86400000)) / 3600000);
            const minutes = Math.floor((diff % 3600000) / 60000);
            const seconds = Math.floor((diff % 60000) / 1000);
            const timerEl = document.getElementById("countdownTimer");
            if (timerEl) timerEl.innerText = `${days}d ${hours}h ${minutes}m ${seconds}s`;
        }
        updateTimer();
        timerInterval = setInterval(updateTimer, 1000);
    }

    function showTemporaryMsg(msg, type) {
        const container = document.getElementById("activationArea");
        if (!container) return;
        let msgDiv = document.getElementById("statusMessage");
        if (!msgDiv && container.querySelector(".card")) {
            const maybeMsg = container.querySelector("#statusMessage");
            if (maybeMsg) msgDiv = maybeMsg;
        }
        if (msgDiv) {
            msgDiv.style.display = "block";
            msgDiv.innerHTML = `<i class="fas ${type === 'error' ? 'fa-exclamation-triangle' : 'fa-circle-check'}"></i> ${msg}`;
            msgDiv.style.borderLeftColor = type === 'error' ? '#ff5e7e' : '#4cd964';
            setTimeout(() => {
                if (msgDiv) msgDiv.style.display = "none";
            }, 4000);
        } else {
            alert(msg);
        }
    }

    // ---------- ADMIN PANEL (Secret phrase: "Admin:JL:Site") ----------
    let adminAuthenticated = false;

    function renderAdminDashboard() {
        const dashboardDiv = document.getElementById("adminDashboard");
        if (!dashboardDiv) return;
        const sub = getSubscription();
        const activeSub = (sub && !sub.isExpired && new Date(sub.expiryDate) > new Date()) ? sub : null;
        const logs = getLogs();
        const usedKeysArray = [...getUsedKeysSet()];
        const validKeysArray = [...VALID_KEYS];
        
        dashboardDiv.innerHTML = `
            <div class="flex-between" style="margin-bottom: 16px;">
                <div><i class="fas fa-chart-line"></i> <strong>Current Subscription</strong></div>
                ${activeSub ? `<button id="adminCancelSubBtn" class="small btn-outline"><i class="fas fa-ban"></i> Cancel Now</button>` : `<span class="info-text">No active plan</span>`}
            </div>
            <div style="background:#0b0e16; border-radius: 1rem; padding: 12px; margin-bottom: 16px;">
                ${activeSub ? `
                    <div><i class="fas fa-key"></i> Key: ${activeSub.keyUsed}</div>
                    <div><i class="fas fa-calendar-alt"></i> Expires: ${new Date(activeSub.expiryDate).toLocaleString()}</div>
                    <div style="margin-top: 8px;"><button id="extendSubBtn" class="small btn-primary"><i class="fas fa-plus-circle"></i> Extend +7 Days</button></div>
                ` : `<span><i class="fas fa-hourglass-end"></i> No active subscription (or expired)</span>`}
            </div>
            <div class="flex-between">
                <strong><i class="fas fa-history"></i> Logs (latest actions)</strong>
                <button id="clearLogsBtn" class="small btn-outline"><i class="fas fa-trash-alt"></i> Clear logs</button>
            </div>
            <div class="log-list" style="margin-top: 8px;">
                ${logs.slice(0, 15).map(log => `
                    <div class="log-entry">
                        📅 ${new Date(log.timestamp).toLocaleString()} | <strong>${log.type}</strong> | 🔑 ${log.key} <br> ${log.message}
                    </div>
                `).join('') || "<div class='log-entry'>No logs yet</div>"}
            </div>
            <div style="margin-top: 16px;">
                <details>
                    <summary style="cursor:pointer;"><i class="fas fa-database"></i> System Info (Used & Valid Keys)</summary>
                    <div style="margin-top: 8px; font-size:0.7rem;">
                        <div><strong>✅ Valid Keys:</strong> ${validKeysArray.join(', ')}</div>
                        <div><strong>🔒 Used Keys:</strong> ${usedKeysArray.length ? usedKeysArray.join(', ') : 'None'}</div>
                        <button id="resetUsedKeysBtn" class="small btn-outline" style="margin-top:6px;"><i class="fas fa-sync-alt"></i> Reset used keys (admin only)</button>
                        <button id="fullResetBtn" class="small btn-outline" style="margin-top:6px; margin-left:6px;"><i class="fas fa-skull-crosswalk"></i> Full System Reset</button>
                    </div>
                </details>
            </div>
        `;
        // Attach admin event handlers
        document.getElementById("adminCancelSubBtn")?.addEventListener("click", async () => {
            if (activeSub) {
                await expireCurrentSubscription(true);
                renderAdminDashboard();
                renderMainUI();
                showTemporaryMsg("Subscription cancelled by admin.", "success");
            }
        });
        document.getElementById("extendSubBtn")?.addEventListener("click", async () => {
            if (activeSub) {
                const newExpiry = new Date(activeSub.expiryDate);
                newExpiry.setDate(newExpiry.getDate() + 7);
                const updatedSub = { ...activeSub, expiryDate: newExpiry.toISOString() };
                saveSubscription(updatedSub);
                await sendTelegramMessage(`📆 <b>Subscription Extended</b>%0AKey: ${activeSub.keyUsed}%0AExtended by +7 days. New expiry: ${newExpiry.toLocaleString()}`);
                addLogEntry("ADMIN_ACTION", activeSub.keyUsed, `Admin extended subscription by 7 days`, true);
                renderAdminDashboard();
                renderMainUI();
                showTemporaryMsg("Subscription extended +7 days", "success");
            }
        });
        document.getElementById("clearLogsBtn")?.addEventListener("click", () => {
            localStorage.setItem(STORAGE_LOGS, JSON.stringify([]));
            renderAdminDashboard();
            showTemporaryMsg("Logs cleared.", "success");
        });
        document.getElementById("resetUsedKeysBtn")?.addEventListener("click", () => {
            if (confirm("Reset ALL used keys? This will allow reusing previously used keys.")) {
                localStorage.setItem(STORAGE_USED_KEYS, JSON.stringify([]));
                renderAdminDashboard();
                showTemporaryMsg("Used keys have been reset.", "success");
            }
        });
        document.getElementById("fullResetBtn")?.addEventListener("click", async () => {
            if (confirm("⚠️ FULL SYSTEM RESET: all subscriptions, keys usage, logs will be deleted. Continue?")) {
                localStorage.removeItem(STORAGE_SUB);
                localStorage.removeItem(STORAGE_USED_KEYS);
                localStorage.removeItem(STORAGE_LOGS);
                localStorage.removeItem(STORAGE_EXPIRY_NOTIFIED);
                if (timerInterval) clearInterval(timerInterval);
                renderMainUI();
                renderAdminDashboard();
                await sendTelegramMessage(`🔄 System reset performed by admin. All subscription data cleared.`);
                showTemporaryMsg("System fully reset.", "success");
            }
        });
    }

    // Admin authentication trigger
    function promptAdminAuth() {
        const phrase = prompt("🔐 Enter admin passphrase:");
        if (phrase === "Admin:JL:Site") {
            adminAuthenticated = true;
            const panelDiv = document.getElementById("adminPanelContainer");
            if (panelDiv) {
                panelDiv.classList.add("show");
                renderAdminDashboard();
            }
            showTemporaryMsg("Admin access granted.", "success");
        } else if (phrase !== null) {
            alert("Invalid passphrase. Access denied.");
        }
    }

    // Auto check for expired subscription on load (expiry trigger)
    async function checkExpiryOnLoad() {
        const sub = getSubscription();
        if (sub && sub.expiryDate && new Date(sub.expiryDate) <= new Date()) {
            await expireCurrentSubscription(false);
        }
        renderMainUI();
    }

    // Event listeners and init
    document.addEventListener("DOMContentLoaded", async () => {
        await checkExpiryOnLoad();
        const adminBtn = document.getElementById("adminTriggerBtn");
        const closeAdminBtn = document.getElementById("closeAdminPanelBtn");
        adminBtn?.addEventListener("click", () => {
            if (!adminAuthenticated) {
                promptAdminAuth();
            } else {
                const panel = document.getElementById("adminPanelContainer");
                if (panel) {
                    if (panel.classList.contains("show")) {
                        panel.classList.remove("show");
                    } else {
                        panel.classList.add("show");
                        renderAdminDashboard();
                    }
                }
            }
        });
        if (closeAdminBtn) {
            closeAdminBtn.addEventListener("click", () => {
                document.getElementById("adminPanelContainer")?.classList.remove("show");
            });
        }
        // periodic check for expiry while page open (every 30 sec)
        setInterval(async () => {
            const sub = getSubscription();
            if (sub && sub.expiryDate && new Date(sub.expiryDate) <= new Date()) {
                await expireCurrentSubscription(false);
                renderMainUI();
            }
        }, 30000);
    });
</script>
</body>
</html>
